name: family-service

on:
  push:
    branches: [main]
    paths:
      - 'apps/family-service/**'
      - 'packages/**'
      - '.github/workflows/family-service.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到 k3s'
        type: boolean
        default: false
      tag:
        description: '镜像 tag（默认使用 commit sha）'
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE: arvzhou/family-os/family-service

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/family-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy }}
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy
        env:
          KUBECONFIG: /home/runner/.kube/config
        run: |
          TAG="${{ inputs.tag || github.sha }}"
          helm upgrade --install family-service infra/k8s/charts/family-service \
            --namespace family-os \
            --set image.tag="${TAG}" \
            --values infra/k8s/charts/family-service/values.yaml
          kubectl rollout status deployment/family-service-family-service -n family-os --timeout=120s || true
