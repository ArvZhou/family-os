name: family-portal

on:
  push:
    branches: [main]
    paths:
      - 'apps/family-portal/**'
      - 'packages/**'
      - '.github/workflows/family-portal.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到 k3s'
        type: boolean
        default: false
      tag:
        description: '镜像 tag（默认使用 commit sha）'
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE: arvzhou/family-os/family-portal

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/family-portal/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy }}
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.K3S_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.K3S_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.K3S_HOST }}
          SSH_USER: ${{ secrets.K3S_SSH_USER }}
        run: |
          TAG="${{ inputs.tag || github.sha }}"
          RELEASE="family-portal"
          DEPLOYMENT="family-portal-family-portal"

          scp -r "infra/k8s/charts/${RELEASE}" "${SSH_USER}@${SSH_HOST}:/tmp/${RELEASE}-chart"

          ssh "${SSH_USER}@${SSH_HOST}" bash -s -- "${TAG}" "${RELEASE}" "${DEPLOYMENT}" << 'REMOTE_SCRIPT'
            TAG=$1
            RELEASE=$2
            DEPLOYMENT=$3
            export KUBECONFIG=~/.kube/config
            helm upgrade --install "${RELEASE}" "/tmp/${RELEASE}-chart" \
              --namespace family-os \
              --set image.tag="${TAG}" \
              --values "/tmp/${RELEASE}-chart/values.yaml"
            kubectl rollout status "deployment/${DEPLOYMENT}" -n family-os --timeout=120s || true
            rm -rf "/tmp/${RELEASE}-chart"
          REMOTE_SCRIPT
