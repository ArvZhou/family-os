## =============================================================================
## Family OS — EMQX MQTT Broker Configuration
## =============================================================================

## MQTT Protocol Listeners
listeners.tcp.default = 0.0.0.0:1883
listeners.ws.default  = 0.0.0.0:8083

## Authentication — Username/Password
## Device credentials: username = deviceId, password = deviceToken
authentication = [
  {
    mechanism = "password_based"
    backend = "built_in_database"
  }
]

## Authorization — ACL per topic
## Devices can only publish/subscribe to their own topics
authorization = {
  no_match = deny
  cache = {
    enable = true
    max_size = 1000
    ttl = 5m
  }
}

## Dashboard
dashboard.default_username = admin
dashboard.default_password = admin

## Rate Limiting
## Per-device message rate limit to prevent flooding
## (configured via EMQX Dashboard or HTTP API)
