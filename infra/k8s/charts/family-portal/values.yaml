replicaCount: 1

image:
  repository: ghcr.io/arvzhou/family-os/family-portal
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  containerPort: 3000

ingress:
  enabled: true
  host: familyos.local
  tls: false
  tlsSecretName: ""

resources:
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    memory: 256Mi
    cpu: 250m

env: {}
# Environment-specific values override in values-dev.yaml / values-prod.yaml
