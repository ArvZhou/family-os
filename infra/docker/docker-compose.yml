# =============================================================================
# Family OS — Local Development Infrastructure
# Start: docker compose -f infra/docker/docker-compose.yml up -d
# =============================================================================

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: family-os-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${DB_NAME:-family_os}
      POSTGRES_USER: ${DB_USER:-family_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-family_user} -d ${DB_NAME:-family_os}']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: family-os-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MQTT Broker (EMQX) ---
  mqtt:
    image: emqx/emqx:latest
    container_name: family-os-mqtt
    ports:
      - '1883:1883' # MQTT TCP
      - '8083:8083' # MQTT WebSocket
      - '18083:18083' # EMQX Dashboard
    environment:
      EMQX_NAME: family-os
      EMQX_HOST: mqtt
    healthcheck:
      test: ['CMD', 'emqx', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Object Storage (MinIO) ---
  minio:
    image: minio/minio:latest
    container_name: family-os-minio
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Console
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
