# =============================================================================
# Family OS — Nginx Reverse Proxy
# Routes:
#   /graphql   → family-service (NestJS GraphQL Gateway)
#   /api/      → family-service (NestJS REST)
#   /auth/     → identity-service (Spring Boot)
#   /          → family-portal (Next.js frontend)
# =============================================================================

upstream family-portal {
    server family-portal:3000;
}

upstream family-service {
    server family-service:4000;
}

upstream identity-service {
    server identity-service:8080;
}

server {
    listen 80;
    server_name localhost;

    # GraphQL endpoint
    location /graphql {
        proxy_pass http://family-service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST API — routed to family-service
    location /api/ {
        proxy_pass http://family-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — routed to identity-service
    location /auth/ {
        proxy_pass http://identity-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
        proxy_pass http://family-portal;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
