# =============================================================================
# Family OS — Identity Service (Spring Boot)
# Identity & Core Data Layer
# =============================================================================

server:
  port: 8080

spring:
  application:
    name: identity-service
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:family_os}
    username: ${DB_USER:family_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # SMTP mail (used when sms.provider=smtp)
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.family
  type-handlers-package: com.family.common.type
  global-config:
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deletedAt
      logic-delete-value: 'now()'
      logic-not-delete-value: 'null'
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json

# JWT — overridden per environment
jwt:
  secret: ${JWT_SECRET}
  refresh-secret: ${JWT_REFRESH_SECRET}
  expiration: ${JWT_EXPIRATION:1800}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}

# SMS / Email Verification — provider configuration
sms:
  provider: ${SMS_PROVIDER:console} # console | aliyun | twilio | smtp

# SSO (OAuth2/OIDC) — reserved
sso:
  enabled: ${SSO_ENABLED:false}
  provider: ${SSO_PROVIDER:keycloak}
  issuer-url: ${SSO_ISSUER_URL:}
  client-id: ${SSO_CLIENT_ID:}
  client-secret: ${SSO_CLIENT_SECRET:}
  redirect-uri: ${SSO_REDIRECT_URI:http://localhost:8080/api/v1/auth/sso/callback}
  scopes: ${SSO_SCOPES:openid,profile,email}
